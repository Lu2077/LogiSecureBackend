# deploy/docker-compose.yml
# ==============================================================================
# LOGISECURE AI - LOCAL / ON-PREMISE ORCHESTRATION
#
# One command from the repository root boots the whole stack:
#   docker compose -f deploy/docker-compose.yml up --build
#
# Backend will be live at  http://localhost:8000  (interactive docs at /docs)
# ==============================================================================

name: logisecure

services:
  # ============================================
  # PostgreSQL Database with PostGIS
  # ============================================
  postgres:
    image: postgis/postgis:15-3.4
    container_name: logisecure-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-logisecure}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-logisecure}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logisecure-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-logisecure}"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # Backend API - Fireworks AI
  # ============================================
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    image: logisecure-backend:latest
    container_name: logisecure-backend
    ports:
      - "${PORT:-8000}:8000"
    # API keys & flags come from backend/.env (created by scripts/setup.*)
    env_file:
      - path: ../backend/.env
        required: true
    environment:
      BACKEND_ENV: ${BACKEND_ENV:-development}
      USE_AMD_ROCM: "False"  # Hackathon mode: inference goes throughcloudapi
      AISSTREAM_API_KEY: ${AISSTREAM_API_KEY:-}
      # Fireworks AI configuration
      #FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      #FIREWORKS_MODEL: ${FIREWORKS_MODEL:-accounts/fireworks/models/llama-v3p1-8b-instruct}
      #FIREWORKS_BASE_URL: ${FIREWORKS_BASE_URL:-https://api.fireworks.ai/inference/v1}
      # LLM Settings
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.3}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-500}
      # Server
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: ${DEBUG:-False}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.7}
      USE_MOCK_DATA: ${USE_MOCK_DATA:-True}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - logisecure-network

  # ============================================
  # Frontend (React/Vite) - Optional
  # ============================================
  # Uncomment when frontend is ready:
  #
  # frontend:
  #   build:
  #     context: ..
  #     dockerfile: deploy/Dockerfile.frontend
  #   container_name: logisecure-frontend
  #   ports:
  #     - "5173:80"
  #   depends_on:
  #     backend:
  #       condition: service_healthy
  #   networks:
  #     - logisecure-network

  # ============================================
  # Production target only (AMD ROCm local inference)
  # ============================================
  # Requires AMD kernel drivers on the host; see README before enabling.
  #
  # logisecure-agent:
  #   image: rocm/rocm-terminal:latest
  #   network_mode: "host"
  #   devices:
  #     - "/dev/kfd:/dev/kfd"
  #     - "/dev/dri:/dev/dri"
  #   security_opt:
  #     - "seccomp=unconfined"
  #   volumes:
  #     - ../:/workspace

# ============================================
# Networks
# ============================================
networks:
  logisecure-network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
